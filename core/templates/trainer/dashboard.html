<!DOCTYPE html>
<html>
<head>
    <title>Trainer Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <span class="navbar-brand">Trainer Dashboard</span>
        <a href="/logout/" class="btn btn-light btn-sm">Logout</a>
    </div>
</nav>

<div class="container mt-4">
    <h3>My Students</h3>

    <table class="table table-bordered table-hover mt-3">
        <thead class="table-dark">
            <tr>
                <th>Student Name</th>
                <th>Email</th>
                <th>Course</th>
                <th>Enrolled On</th>
            </tr>
        </thead>
        <tbody>
            {% for enroll in enrollments %}
            <tr>
                <td>{{ enroll.student.username }}</td>
                <td>{{ enroll.student.email }}</td>
                <td>{{ enroll.course_name }}</td>
                <td>{{ enroll.created_at|date:"d M Y" }}</td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="4" class="text-center">No students enrolled</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

</body>
</html>
